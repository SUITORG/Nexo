name: Deploy to GitHub Pages Securely

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secure Config File
        run: |
          mkdir -p js/modules
          U=$(echo "${{ secrets.API_URL }}" | tr -d '[:space:]')
          T=$(echo "${{ secrets.API_TOKEN }}" | tr -d '[:space:]')
          printf "const SUIT_CONFIG = {\n    apiUrl: '%%s',\n    apiToken: '%%s'\n};\n" "$U" "$T" > js/modules/config.js
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
