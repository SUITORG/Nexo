<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Conexión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, textarea, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 100px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Test de Conexión Google Sheets</h1>

    <form class="test-form" id="testForm">
        <input type="text" id="testUrl" placeholder="URL del Google Apps Script"
               value="https://script.google.com/macros/s/AKfycby5gjlVPYLxAC1BtmEfPYa69ivpnrJnMLSKzyWAi6L3MMLajAda8oI8sk1D8zZdLc31XQ/exec">
        <textarea id="testCaption" placeholder="Caption de prueba" required>Este es un test de contenido</textarea>
        <input type="url" id="testMediaUrl" placeholder="URL de media (opcional)">
        <input type="datetime-local" id="testPostDate" required>
        <input type="password" id="testToken" value="SUITORG_SECURE_TOKEN_2026" placeholder="Token">
        <button type="submit">Probar Conexión</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const result = document.getElementById('result');
            result.textContent = 'Enviando...';

            const formData = {
                caption: document.getElementById('testCaption').value,
                mediaUrl: document.getElementById('testMediaUrl').value,
                postDate: document.getElementById('testPostDate').value,
                token: document.getElementById('testToken').value
            };

            try {
                const response = await fetch(document.getElementById('testUrl').value, {
                    method: 'POST',
                    mode: 'cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);

                if (data.status === 'success') {
                    result.style.color = 'green';
                } else {
                    result.style.color = 'red';
                }
            } catch (error) {
                result.textContent = 'Error: ' + error.message;
                result.style.color = 'red';
            }
        });

        // Establecer fecha y hora actual por defecto
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('testPostDate').value = now.toISOString().slice(0, 16);
    </script>
</body>
</html>
