<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Campañas - SuitOrg</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-small:hover {
            background: #34495e;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 800px; /* Más ancho para el storyboard */
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        /* Mockup V2 Storyboard */
        .storyboard-v2 {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 20px;
        }

        .mockup-scene {
            display: flex;
            gap: 30px;
            align-items: center;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #eee;
        }

        .phone-frame {
            width: 280px;
            height: 500px;
            background: #333;
            border-radius: 35px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background-color: #000;
            background-size: cover;
            background-position: center;
            border-radius: 25px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .screen-overlay {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 15px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            position: absolute;
            bottom: 20%;
        }

        .scene-notes {
            flex-grow: 1;
        }

        .scene-notes h3 {
            color: #3498db;
            margin-bottom: 10px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .status-section {
            background: #e8f5e9;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-borrador {
            background: #fff3cd;
            color: #856404;
        }

        .status-generando {
            background: #cce5ff;
            color: #0066cc;
        }

        .status-completo {
            background: #d4edda;
            color: #155724;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bullhorn"></i> Sistema de Campañas</h1>
            <p>Crea y gestiona contenido para redes sociales de forma optimizada</p>
        </div>

        <div class="content">
            <div class="form-section">
                <h2><i class="fas fa-plus-circle"></i> Nueva Campaña</h2>
                <form id="campañaForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="empresa">Empresa</label>
                            <input type="text" id="empresa" name="empresa" required>
                        </div>
                        <div class="form-group">
                            <label for="nombre">Nombre de Campaña</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="tema">Tema Principal</label>
                            <input type="text" id="tema" name="tema" required>
                        </div>
                        <div class="form-group">
                            <label for="formato">Formato</label>
                            <select id="formato" name="formato" required>
                                <option value="">Seleccionar...</option>
                                <option value="reel">Reel</option>
                                <option value="post">Post</option>
                                <option value="story">Story</option>
                                <option value="banner">Banner</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="numero_laminas">Número de Láminas/Elementos</label>
                            <input type="number" id="numero_laminas" name="numero_laminas" min="1" max="20" value="5" required>
                        </div>
                        <div class="form-group">
                            <label for="publico">Público Objetivo</label>
                            <input type="text" id="publico" name="publico" value="Profesionales" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fecha_publicacion">Fecha de Publicación</label>
                            <input type="date" id="fecha_publicacion" name="fecha_publicacion" required>
                        </div>
                        <div class="form-group">
                            <label for="plantilla">Plantilla</label>
                            <select id="plantilla" name="plantilla" required>
                                <option value="">Seleccionar...</option>
                                <option value="reel_template">Reel Técnico</option>
                                <option value="post_template">Post Engagement</option>
                                <option value="story_template">Stories Q&A</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn">
                        <i class="fas fa-rocket"></i> Generar Campaña
                        <div class="loader" id="loader"></div>
                    </button>
                </form>
            </div>

            <div class="form-section">
                <h2><i class="fas fa-list"></i> Campañas Recientes</h2>
                <div id="campañasList">
                    <div class="status-item">
                        <div>
                            <strong>SuitOrg - Marketing Técnico 2024</strong>
                            <br>
                            <small>Reel | 8 láminas | Profesionales Tech</small>
                        </div>
                        <span class="status-badge status-borrador">Borrador</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i> <span id="notificationText"></span>
    </div>

    <!-- Modal de Detalles -->
    <div id="detalleModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="manager.cerrarModal()">&times;</span>
            <div id="modalContenido"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
